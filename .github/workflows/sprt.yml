name: Release SPRT

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-sprt-${{ github.ref }}
  cancel-in-progress: true

env:
  SPRT_ELO0: "-30"
  SPRT_ELO1: "30"
  SPRT_ALPHA: "0.10"
  SPRT_BETA: "0.10"
  SPRT_GAMES_PER_BATCH: "12"
  SPRT_MAX_GAMES: "360"
  SPRT_MOVETIME_MS: "80"
  SPRT_MAX_PLIES: "220"
  ENGINE_THREADS: "1"
  ENGINE_HASH_MB: "64"
  SPRT_OPENINGS: "default"
  SPRT_PRACTICAL_MIN_GAMES: "120"
  SPRT_PRACTICAL_P_THRESHOLD: "0.05"
  SPRT_ALLOW_INCONCLUSIVE: "true"

jobs:
  sprt:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install chess

      - name: Resolve release tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          if [ -z "${current_tag}" ]; then
            current_tag="$(git describe --tags --exact-match)"
          fi

          prev_tag="$(git tag --sort=-version:refname --list 'v*' | grep -Fxv "${current_tag}" | head -n 1 || true)"
          if [ -z "${prev_tag}" ]; then
            echo "Unable to resolve previous v* tag for baseline."
            exit 1
          fi

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${prev_tag}" >> "$GITHUB_OUTPUT"
          echo "Current tag: ${current_tag}"
          echo "Previous tag: ${prev_tag}"

      - name: Build candidate engine
        shell: bash
        run: |
          set -euo pipefail
          zig build -Doptimize=ReleaseFast
          cp zig-out/bin/sykora ./candidate_sykora

      - name: Build baseline engine (previous tag)
        shell: bash
        run: |
          set -euo pipefail
          worktree_dir="$(mktemp -d "${RUNNER_TEMP}/sykora-prev.XXXXXX")"
          cleanup() {
            git worktree remove --force "$worktree_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git worktree add --detach "$worktree_dir" "${{ steps.tags.outputs.prev_tag }}"
          (
            cd "$worktree_dir"
            zig build -Doptimize=ReleaseFast
          )
          cp "$worktree_dir/zig-out/bin/sykora" ./baseline_sykora

      - name: Run SPRT
        id: sprt
        shell: bash
        run: |
          set -euo pipefail
          args=(
            ./baseline_sykora
            ./candidate_sykora
            --name1 "${{ steps.tags.outputs.prev_tag }}"
            --name2 "${{ steps.tags.outputs.current_tag }}"
            --elo0 "${SPRT_ELO0}"
            --elo1 "${SPRT_ELO1}"
            --alpha "${SPRT_ALPHA}"
            --beta "${SPRT_BETA}"
            --games-per-batch "${SPRT_GAMES_PER_BATCH}"
            --max-games "${SPRT_MAX_GAMES}"
            --movetime-ms "${SPRT_MOVETIME_MS}"
            --max-plies "${SPRT_MAX_PLIES}"
            --threads "${ENGINE_THREADS}"
            --hash-mb "${ENGINE_HASH_MB}"
            --openings "${SPRT_OPENINGS}"
            --shuffle-openings
            --practical-min-games "${SPRT_PRACTICAL_MIN_GAMES}"
            --practical-p-threshold "${SPRT_PRACTICAL_P_THRESHOLD}"
            --summary-json sprt_summary.json
          )

          if [ "${SPRT_ALLOW_INCONCLUSIVE}" = "true" ]; then
            args+=(--allow-inconclusive)
          fi

          set +e
          python utils/match/sprt.py "${args[@]}" | tee sprt.log
          code=${PIPESTATUS[0]}
          set -e

          echo "sprt_exit_code=${code}" >> "$GITHUB_OUTPUT"

          if [ "$code" -gt 2 ]; then
            echo "SPRT runner failed with unexpected exit code: $code"
            exit "$code"
          fi

          if [ "$code" -eq 1 ]; then
            echo "SPRT accepted H0 (candidate weaker)."
            exit 1
          fi

          if [ "$code" -eq 2 ]; then
            echo "SPRT inconclusive and allow_inconclusive=false."
            exit 1
          fi

      - name: Upload SPRT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-sprt-${{ steps.tags.outputs.current_tag }}
          if-no-files-found: warn
          path: |
            sprt.log
            sprt_summary.json
