name: CI Regression

on:
  push:
    paths:
      - "**/*.zig"
  pull_request:
    paths:
      - "**/*.zig"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-regression-${{ github.ref }}
  cancel-in-progress: true

env:
  STS_PATTERN: "STS*.epd"
  STS_MAX_POSITIONS: "400"
  STS_MOVETIME_MS: "40"
  SELFPLAY_GAMES: "24"
  SELFPLAY_MOVETIME_MS: "80"
  ENGINE_THREADS: "1"
  ENGINE_HASH_MB: "64"
  SELFPLAY_ALLOW_TIES: "true"

jobs:
  sts-and-selfplay:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install chess

      - name: Resolve previous commit
        id: prev
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "sha=$(git rev-parse HEAD^)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build candidate engine
        shell: bash
        run: |
          set -euo pipefail
          zig build -Doptimize=ReleaseFast
          cp zig-out/bin/sykora ./candidate_sykora

      - name: Run STS
        shell: bash
        run: |
          set -euo pipefail
          python utils/sts/sts.py \
            --engine ./candidate_sykora \
            --epd ./epd \
            --pattern "${STS_PATTERN}" \
            --max-positions "${STS_MAX_POSITIONS}" \
            --movetime-ms "${STS_MOVETIME_MS}" \
            --threads "${ENGINE_THREADS}" \
            --hash-mb "${ENGINE_HASH_MB}" \
            --show none \
            | tee sts_candidate.log

      - name: Build previous commit engine
        if: steps.prev.outputs.sha != ''
        shell: bash
        run: |
          set -euo pipefail
          worktree_dir="$(mktemp -d "${RUNNER_TEMP}/sykora-prev.XXXXXX")"
          cleanup() {
            git worktree remove --force "$worktree_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          git worktree add --detach "$worktree_dir" "${{ steps.prev.outputs.sha }}"
          (
            cd "$worktree_dir"
            zig build -Doptimize=ReleaseFast
          )
          cp "$worktree_dir/zig-out/bin/sykora" ./baseline_sykora

      - name: Run self-play against previous commit
        if: steps.prev.outputs.sha != ''
        shell: bash
        run: |
          set -euo pipefail
          set +e
          python utils/match/selfplay.py \
            ./baseline_sykora \
            ./candidate_sykora \
            --name1 previous \
            --name2 current \
            --games "${SELFPLAY_GAMES}" \
            --movetime-ms "${SELFPLAY_MOVETIME_MS}" \
            --threads "${ENGINE_THREADS}" \
            --hash-mb "${ENGINE_HASH_MB}" \
            --shuffle-openings \
            --summary-json selfplay_summary.json \
            | tee selfplay.log
          code=$?
          set -e

          echo "selfplay_exit_code=${code}" | tee -a selfplay.log

          if [ "$code" -eq 1 ]; then
            echo "Candidate lost to previous commit."
            exit 1
          fi

          if [ "$code" -eq 2 ] && [ "${SELFPLAY_ALLOW_TIES}" != "true" ]; then
            echo "Self-play tied and SELFPLAY_ALLOW_TIES is not true."
            exit 1
          fi

          if [ "$code" -gt 2 ]; then
            echo "Self-play failed with unexpected exit code: $code"
            exit "$code"
          fi

      - name: No previous commit available
        if: steps.prev.outputs.sha == ''
        shell: bash
        run: |
          echo "No previous commit found. Self-play was skipped." | tee selfplay.log

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-regression-${{ github.sha }}
          if-no-files-found: warn
          path: |
            sts_candidate.log
            selfplay.log
            selfplay_summary.json
